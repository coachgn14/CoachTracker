<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach Outreach Tracker — SUFS Recruiting</title>
<style>
  :root{
    --purple:#3D1A5B;
    --purple-dark:#2A1142;
    --purple-tint:#EFE7F7;
    --purple-tint-2:#F7F2FC;
    --orange:#F2790A;
    --orange-tint:#FDE9D6;
    --white:#FFFFFF;
    --ink:#2A1F33;
    --muted:#6B6478;
    --border:#E3DCEE;
    --green:#1C7C4C;
    --green-tint:#E3F5EA;
    --slate:#52606D;
    --slate-tint:#E7ECEF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:Calibri,"Segoe UI",Arial,sans-serif;
    background:var(--white);
    color:var(--ink);
  }
  .app{max-width:1180px;margin:0 auto;padding:28px 24px 60px;}
  .header{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:24px;flex-wrap:wrap;gap:16px;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-mark{
    width:44px;height:44px;border-radius:50%;
    background:var(--purple);display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .brand-mark svg{width:22px;height:22px;}
  .brand-text .eyebrow{
    font-size:11px;letter-spacing:2px;font-weight:700;color:var(--orange);
    text-transform:uppercase;margin:0 0 2px;
  }
  .brand-text h1{
    margin:0;font-size:22px;font-weight:700;color:var(--purple);
    font-family:Cambria,Georgia,serif;
  }
  .header-actions{display:flex;gap:10px;flex-wrap:wrap;}
  button{font-family:inherit;cursor:pointer;}
  .btn{
    border:none;border-radius:8px;padding:11px 18px;font-size:14px;font-weight:600;
    display:inline-flex;align-items:center;gap:8px;transition:transform .08s ease, box-shadow .15s ease;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--orange);color:var(--white);}
  .btn-primary:hover{box-shadow:0 4px 14px rgba(242,121,10,.35);}
  .btn-secondary{background:var(--purple-tint);color:var(--purple);}
  .btn-secondary:hover{box-shadow:0 4px 14px rgba(61,26,91,.15);}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
  .btn-ghost:hover{background:var(--purple-tint-2);}
  .stats{
    display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px;
  }
  .stat-card{
    background:var(--purple-tint-2);border:1px solid var(--border);border-radius:10px;
    padding:14px 16px;
  }
  .stat-card .num{font-size:26px;font-weight:700;color:var(--purple);font-family:Cambria,serif;line-height:1.1;}
  .stat-card .label{font-size:11.5px;color:var(--muted);margin-top:4px;font-weight:600;letter-spacing:.3px;}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
  .filter-pill{
    border:1px solid var(--border);background:var(--white);color:var(--ink);
    border-radius:999px;padding:8px 16px;font-size:13px;font-weight:600;
    display:flex;align-items:center;gap:6px;
  }
  .filter-pill.active{background:var(--purple);border-color:var(--purple);color:var(--white);}
  .filter-pill .dot{width:8px;height:8px;border-radius:50%;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px;}
  .card{
    border:1px solid var(--border);border-radius:12px;background:var(--white);
    padding:18px;display:flex;flex-direction:column;gap:12px;
    box-shadow:0 2px 10px rgba(61,26,91,.05);
  }
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .school-name{font-size:17px;font-weight:700;color:var(--purple);font-family:Cambria,serif;margin:0 0 4px;}
  .division-badge{
    display:inline-block;font-size:11px;font-weight:700;color:var(--purple);
    background:var(--purple-tint);border-radius:5px;padding:2px 7px;letter-spacing:.5px;
  }
  .status-badge{
    font-size:11.5px;font-weight:700;border-radius:999px;padding:5px 12px;
    white-space:nowrap;display:flex;align-items:center;gap:6px;
  }
